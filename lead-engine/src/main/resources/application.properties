# Database URL (replace 'lead_db' with the name you'll create in pgAdmin)
spring.datasource.url=jdbc:postgresql://localhost:5432/lead_db
spring.datasource.username=postgres
spring.datasource.password=1976

# Hibernate settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect